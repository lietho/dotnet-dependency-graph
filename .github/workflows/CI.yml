name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  windows-latest:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: 'Cache: ~/.nuget/packages, tools'
        uses: actions/cache@v6
        with:
          path: |
            ~/.nuget/packages
            tools
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props') }}
      - name: 'Run: Test'
        run: dotnet run --project src/build/Build.csproj -- --target=Test
        env:
          NugetTestToken: ${{ secrets.NUGET_TEST_TOKEN }}
          NugetToken: ${{ secrets.NUGET_TOKEN }}
